spring.datasource.password=Sp@3$%ghgfjd@!(6&)
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=false

# JWT Configuration
jwt.secret=dev-only-insecure-secret-change-me-32-bytes-minimum
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000

# Logging Configuration
logging.level.root=INFO
logging.level.com.sparsh.freelancehub=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.springframework.boot.autoconfigure.jdbc=DEBUG

