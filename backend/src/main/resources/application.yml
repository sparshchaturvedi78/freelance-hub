spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/freelance_hub?options=-c%20TimeZone=Asia%2FKolkata
    username: ${POSTGRES_USER:freelance_hub}
    password: ${POSTGRES_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.PostgreSQLDialect

    properties:
      hibernate:
        format_sql: true

    show-sql: true

jwt:
  secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-32-bytes-min}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

server:
  port: 8081