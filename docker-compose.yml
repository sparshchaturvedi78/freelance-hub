services:
  postgres:
    image: postgres:16
    container_name: freelance-hub-postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freelance_hub}
      POSTGRES_USER: ${POSTGRES_USER:-freelance_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: